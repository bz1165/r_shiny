id: ex101_analysis_sets
title: "Analysis sets — Table 14.1-2.1.f"
description: |
  Build the analysis sets table corresponding to 14.1-2.1.f.

  Goal:
  - columns:
      Screen Failures/Not Assigned
      Inclisiran-Inclisiran
      Placebo-Inclisiran
      Total
  - rows:
      Screened set
      Randomized set
      Full analysis set
      Safety set
      Open-label set
  - use the mixed helper so that:
      Screened set shows counts only
      the other rows show n (%)
  - focus on rtables layout only

starter_file: "ex101_analysis_sets_starter.R"
reference_file: "ex101_analysis_sets_reference.R"
timeout_sec: 20

shell_table: "Table 14.1-2.1.f"
shell_file: ""
grading_mode: "table_text"
helper_keys:
  - a_set_row_cell
  - a_npct_subj
  - split_vs_summarize
  - alt_counts_df
